<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>JT1078 Live</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body style="background:#111;color:#eee;font-family:sans-serif;padding:16px">
  <h3>JT1078 Live Test (H.265 &rarr; H.264 HLS)</h3>
  <p>Stream key = <code>{SIM}_{channel}</code> — check the gateway console line
     <code>[INGEST] LIVE stream key=...</code>, or click <b>List streams</b>.</p>
  <input id="key" value="2080310569_1" style="width:280px;padding:4px">
  <button onclick="play()" style="padding:4px 10px">Play</button>
  <button onclick="streams()" style="padding:4px 10px">List streams</button>
  <div style="margin-top:8px">
    <video id="v" controls autoplay muted playsinline style="width:760px;max-width:95vw;background:#000"></video>
  </div>
  <pre id="out" style="color:#9f9"></pre>
  <script>
    let hls;
    function play() {
      const key = document.getElementById('key').value.trim();
      const v = document.getElementById('v');
      const url = `/live/${key}.m3u8`;
      if (hls) { hls.destroy(); hls = null; }
      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({ liveSyncDurationCount: 2, lowLatencyMode: true });
        hls.loadSource(url);
        hls.attachMedia(v);
        hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        hls.on(Hls.Events.ERROR, (e, d) => {
          document.getElementById('out').textContent = 'hls error: ' + d.type + ' / ' + d.details;
        });
      } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari / iOS native HLS
        v.src = url; v.play();
      } else {
        document.getElementById('out').textContent = 'HLS not supported in this browser';
      }
    }
    async function streams() {
      const r = await fetch('/streams');
      document.getElementById('out').textContent = 'active streams: ' + await r.text();
    }
  </script>
</body>
</html>
